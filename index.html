<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Saray Anime</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0e17;
            min-height: 100vh;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            overflow-x: hidden;
            position: relative;
            padding-bottom: 90px;
        }

        /* 🌙 القمر والنجوم المحسنة للأداء */
        .moon {
            position: fixed;
            top: 4%;
            left: 8%;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 35% 35%, #ffffff, #d4d4d4 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            z-index: 1;
            pointer-events: none;
            will-change: transform;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.6;
        }

        /* 🚀 الحاوية الرئيسية */
        .app-container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 18px;
        }

        /* 🔝 الهيدر العلوي */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .brand-title {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #8ab4f8;
            text-shadow: 0 0 10px rgba(138, 180, 248, 0.3);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e6ed;
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* 🔍 شريط البحث الخفيف والسريع جداً دون تعليق */
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 14px 45px 14px 16px;
            background: rgba(20, 28, 45, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: #8ab4f8;
        }

        .search-icon {
            position: absolute;
            top: 50%;
            right: 16px;
            transform: translateY(-50%);
            color: #8ab4f8;
            font-size: 1.1rem;
            pointer-events: none;
        }

        /* 🏷️ قائمة الكل */
        .categories-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .category-chip {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            font-size: 0.95rem;
            color: #e0e6ed;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .category-chip.active {
            border-color: #8ab4f8;
            background: rgba(138, 180, 248, 0.12);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="moon"></div>
    <div class="stars" id="starsContainer"></div>

    <div class="app-container">
        <header class="app-header">
            <h1 class="brand-title">Saray Anime</h1>
            <div class="header-actions">
                <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                <button class="icon-btn"><i class="fa-regular fa-user"></i></button>
            </div>
        </header>

        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" class="search-input" placeholder="ابحث عن أنميك المفضل...">
        </div>

        <div class="categories-container">
            <div class="category-chip active">
                <i class="fa-solid fa-border-all" style="color: #8ab4f8;"></i> الكل
            </div>
        </div>
    </div>

    <script>
        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 40; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.left = `${Math.random() * 100}%`;
            starsContainer.appendChild(star);
        }

        let currentPage = 1;
        let isLoading = false;

        async function fetchAnime(page) {
            if (isLoading) return;
            isLoading = true;
            const container = document.getElementById('animeContainer');
            
            try {
                const res = await fetch(`https://api.jikan.moe/v4/top/anime?page=${page}&limit=20`);
                const data = await res.json();
                
                if (page === 1) container.innerHTML = '';

                data.data.forEach(anime => {
                    const card = document.createElement('div');
                    card.className = 'anime-card';
                    card.innerHTML = `
                        <div class="poster-wrapper">
                            <img class="poster-img" src="${anime.images.jpg.large_image_url}" loading="lazy">
                            <div class="rating-badge"><i class="fa-solid fa-star"></i> ${anime.score || 'N/A'}</div>
                        </div>
                        <div class="anime-info">
                            <div class="anime-title">${anime.title}</div>
                            <div class="anime-meta">
                                <span>${anime.type || 'TV'}</span>
                                <span>${anime.episodes ? anime.episodes + ' حلقة' : 'مستمر'}</span>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
                currentPage++;
            } catch(e) {}
            isLoading = false;
        }

        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 400) {
                fetchAnime(currentPage);
            }
        });

        fetchAnime(1);
    </script>
</body>
</html>
