<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saray Anime</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at bottom, #0d1d31 0%, #0c1022 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Tajawal', sans-serif;
            position: relative;
        }

        /* 🌙 القمر الواقعي */
        .moon {
            position: absolute;
            top: 8%;
            right: 12%;
            width: 90px;
            height: 90px;
            background: radial-gradient(circle at 35% 35%, #ffffff, #e6e6e6 50%, #d4d4d4 100%);
            border-radius: 50%;
            box-shadow: 0 0 35px rgba(255, 255, 255, 0.4), 0 0 80px rgba(255, 255, 255, 0.15);
            z-index: 1;
        }

        /* ☁️ الغيوم المتحركة */
        .clouds {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://i.postimg.co/c1b2pPvx/cloud.png') repeat-x;
            background-size: cover;
            opacity: 0.25;
            animation: moveClouds 60s linear infinite;
            z-index: 2;
        }

        @keyframes moveClouds {
            0% { background-position: 0 0; }
            100% { background-position: 1000px 0; }
        }

        /* ✨ النجوم الواقعية */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 6px rgba(255,255,255,0.8); }
        }

        /* 🟌 كارت المحتوى */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(13, 20, 36, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            max-width: 90%;
            width: 360px;
        }

        /* ⚡ خط إنجليزي فخم مع حركة اختفاء وظهور كلمة Saray Anime */
        .title {
            font-family: 'Cinzel', serif;
            font-size: 2.3rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ff4b4b 0%, #ff8585 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 75, 75, 0.3);
            margin-bottom: 15px;
            animation: pulseFade 4s ease-in-out infinite;
        }

        @keyframes pulseFade {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
                filter: drop-shadow(0 0 15px rgba(255, 75, 75, 0.6));
            }
            50% {
                opacity: 0;
                transform: scale(0.95);
                filter: drop-shadow(0 0 0px rgba(255, 75, 75, 0));
            }
        }

        .subtitle {
            color: #d1d5db;
            font-size: 1.05rem;
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>

    <div class="moon"></div>
    <div class="clouds"></div>
    <div class="stars" id="starsContainer"></div>

    <div class="card">
        <h1 class="title">Saray Anime</h1>
        <p class="subtitle">🌌 أهلاً بك في عالم الأنمي الخاص بك</p>
    </div>

    <script>
        const container = document.getElementById('starsContainer');
        const count = 120;

        for (let i = 0; i < count; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            
            const size = Math.random() * 2.5 + 0.8;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            
            star.style.top = `${Math.random() * 100}%`;
            star.style.left = `${Math.random() * 100}%`;
            
            const duration = Math.random() * 3 + 2;
            star.style.setProperty('--duration', `${duration}s`);
            star.style.animationDelay = `${Math.random() * 5}s`;
            
            container.appendChild(star);
        }
    </script>
</body>
</html>
