<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Saray Anime</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0e17;
            min-height: 100vh;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            overflow-x: hidden;
            position: relative;
            padding-bottom: 90px;
        }

        /* 🌙 القمر والنجوم المحسنة للأداء */
        .moon { position: fixed !important; top: 25px; left: 8%; width: 70px; height: 70px; background: radial-gradient(circle at 35% 35%, #ffffff, #d4d4d4 100%); border-radius: 50%; box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); z-index: 0; pointer-events: none; }
            position: fixed;
            top: 4%;
            left: 8%;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 35% 35%, #ffffff, #d4d4d4 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            z-index: 1;
            pointer-events: none;
            will-change: transform;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.6;
        }

        /* 🚀 الحاوية الرئيسية */
        .app-container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 18px;
        }

        /* 🔝 الهيدر العلوي */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .brand-title {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #8ab4f8;
            text-shadow: 0 0 10px rgba(138, 180, 248, 0.3);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e6ed;
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* 🔍 شريط البحث الخفيف والسريع جداً دون تعليق */
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 14px 45px 14px 16px;
            background: rgba(20, 28, 45, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: #8ab4f8;
        }

        .search-icon {
            position: absolute;
            top: 50%;
            right: 16px;
            transform: translateY(-50%);
            color: #8ab4f8;
            font-size: 1.1rem;
            pointer-events: none;
        }

        /* 🏷️ قائمة الكل */
        .categories-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .category-chip {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            font-size: 0.95rem;
            color: #e0e6ed;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .category-chip.active {
            border-color: #8ab4f8;
            background: rgba(138, 180, 248, 0.12);
            color: #fff;
        }
        .anime-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 15px; }
        .anime-card { position: relative; background: rgba(20, 28, 45, 0.85); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.08); }
        .poster-wrapper { position: relative; width: 100%; padding-top: 140%; background: #141c2d; }
        .poster-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .rating-badge { position: absolute; top: 8px; right: 8px; background: rgba(10, 14, 23, 0.85); padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; color: #ffd700; }
        .anime-info { padding: 10px; }
        .anime-title { font-size: 0.9rem; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .anime-meta { font-size: 0.75rem; color: #8ab4f8; display: flex; justify-content: space-between; margin-top: 4px; }
        /* 📱 نافذة التفاصيل الكاملة */
        .details-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0e17;
            z-index: 1000;
            overflow-y: auto;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding-bottom: 40px;
        }
        .details-modal.active { display: block; opacity: 1; }
        .close-btn {
            position: fixed;
            top: 20px; right: 20px;
            width: 40px; height: 40px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: #fff; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1010;
        }
        .banner-header {
            position: relative;
            width: 100%; height: 260px;
            background-size: cover; background-position: center;
        }
        .banner-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(10,14,23,0.3) 0%, #0a0e17 100%);
        }
        .modal-body {
            padding: 0 20px;
            margin-top: -60px;
            position: relative; z-index: 1002;
        }
        .detail-header-flex {
            display: flex; gap: 15px; align-items: flex-end;
            margin-bottom: 20px;
        }
        .modal-poster {
            width: 110px; height: 160px;
            border-radius: 14px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            flex-shrink: 0;
        }
        .modal-info { flex: 1; }
        .modal-title {
            font-size: 1.2rem; font-weight: 700;
            color: #fff; margin-bottom: 8px;
            line-height: 1.3;
        }
        .modal-badges {
            display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px;
        }
        .m-badge {
            background: rgba(138, 180, 248, 0.12);
            border: 1px solid rgba(138, 180, 248, 0.3);
            color: #8ab4f8; padding: 4px 10px;
            border-radius: 12px; font-size: 0.75rem;
        }
        .synopsis-title {
            font-size: 1rem; color: #8ab4f8; margin: 20px 0 8px 0;
            display: flex; align-items: center; gap: 8px;
        }
        .synopsis-text {
            font-size: 0.9rem; color: #c5d1e0; line-height: 1.6;
            background: rgba(255,255,255,0.03);
            padding: 12px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .episodes-sec-title {
            font-size: 1rem; color: #fff; margin: 25px 0 12px 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }
        .ep-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 8px;
            border-radius: 12px; text-align: center;
            color: #e0e6ed; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: 0.2s;
        }
        .ep-card:active {
            background: rgba(138, 180, 248, 0.2);
            border-color: #8ab4f8; color: #fff;
        }
    </style>
</head>
<body>

    <div class="moon"></div>
    <div class="stars" id="starsContainer"></div>

    <div class="app-container">
        <header class="app-header">
            <h1 class="brand-title">Saray Anime</h1>
            <div class="header-actions">
                <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                <button class="icon-btn"><i class="fa-regular fa-user"></i></button>
            </div>
        </header>

        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" class="search-input" placeholder="ابحث عن أنميك المفضل...">
        </div>

        <div class="categories-container">
            <div class="category-chip active">
                <i class="fa-solid fa-border-all" style="color: #8ab4f8;"></i> الكل
            </div>
        </div>
    </div>

        <div id="animeContainer" class="anime-grid"></div>
    <script>
        // 1. بناء تصميم وحاوية التفاصيل تلقائياً داخل الصفحة
        const modalStyle = document.createElement('style');
        modalStyle.innerHTML = `
            .details-modal {
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: #0a0e17; z-index: 10000; overflow-y: auto;
                display: none; opacity: 0; transition: opacity 0.25s ease;
                padding-bottom: 40px;
            }
            .details-modal.active { display: block; opacity: 1; }
            .close-btn {
                position: fixed; top: 20px; right: 20px;
                width: 42px; height: 42px; background: rgba(255, 255, 255, 0.15);
                backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 50%; color: #fff; font-size: 1.2rem;
                display: flex; align-items: center; justify-content: center;
                cursor: pointer; z-index: 10001;
            }
            .banner-header { position: relative; width: 100%; height: 230px; background-size: cover; background-position: center; }
            .banner-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(10,14,23,0.1) 0%, #0a0e17 100%); }
            .modal-body { padding: 0 18px; margin-top: -50px; position: relative; z-index: 10002; }
            .detail-header-flex { display: flex; gap: 14px; align-items: flex-end; margin-bottom: 20px; }
            .modal-poster { width: 110px; height: 160px; border-radius: 14px; object-fit: cover; border: 2px solid rgba(255,255,255,0.15); box-shadow: 0 8px 25px rgba(0,0,0,0.8); flex-shrink: 0; }
            .modal-title { font-size: 1.15rem; font-weight: 700; color: #fff; margin-bottom: 8px; line-height: 1.3; }
            .modal-badges { display: flex; gap: 6px; flex-wrap: wrap; }
            .m-badge { background: rgba(138, 180, 248, 0.12); border: 1px solid rgba(138, 180, 248, 0.3); color: #8ab4f8; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; }
            .synopsis-title { font-size: 0.95rem; color: #8ab4f8; margin: 20px 0 8px 0; font-weight: 700; }
            .synopsis-text { font-size: 0.88rem; color: #c5d1e0; line-height: 1.6; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
            .episodes-sec-title { font-size: 0.95rem; color: #fff; margin: 22px 0 12px 0; font-weight: 700; }
            .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
            .ep-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px 8px; border-radius: 12px; text-align: center; color: #e0e6ed; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
            .ep-card:active { background: rgba(138, 180, 248, 0.25); border-color: #8ab4f8; color: #fff; }
        `;
        document.head.appendChild(modalStyle);

        const modalHTML = `
        <div id="detailsModal" class="details-modal">
            <button class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            <div id="modalBanner" class="banner-header"><div class="banner-overlay"></div></div>
            <div class="modal-body">
                <div class="detail-header-flex">
                    <img id="modalPoster" class="modal-poster" src="" alt="">
                    <div>
                        <div id="modalTitle" class="modal-title">...</div>
                        <div class="modal-badges">
                            <span id="modalScore" class="m-badge">⭐ 0.0</span>
                            <span id="modalFormat" class="m-badge">TV</span>
                            <span id="modalEps" class="m-badge">0 حلقة</span>
                        </div>
                    </div>
                </div>
                <div class="synopsis-title"><i class="fa-solid fa-align-right"></i> القصة:</div>
                <div id="modalSynopsis" class="synopsis-text">...</div>
                <div class="episodes-sec-title"><i class="fa-solid fa-list-ol" style="color: #8ab4f8;"></i> الحلقات:</div>
                <div id="episodesGrid" class="episodes-grid"></div>
            </div>
        </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHTML);

        // 2. النجوم السريعة
        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 40; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.left = `${Math.random() * 100}%`;
            starsContainer.appendChild(star);
        }

        // 3. جلب الأنميات والربط مع الضغط
        let currentPage = 1;
        let isLoading = false;
        let hasNextPage = true;

        const query = `
        query ($page: Int, $perPage: Int) {
          Page (page: $page, perPage: $perPage) {
            pageInfo { hasNextPage }
            media (type: ANIME, sort: POPULARITY_DESC) {
              id
              title { romaji native english }
              coverImage { extraLarge }
              bannerImage
              description
              averageScore
              episodes
              format
            }
          }
        }
        `;

        async function fetchAniListAnime() {
            if (isLoading || !hasNextPage) return;
            isLoading = true;
            const container = document.getElementById('animeContainer');

            try {
                const response = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, variables: { page: currentPage, perPage: 20 } })
                });

                const resData = await response.json();
                const pageData = resData.data.Page;
                hasNextPage = pageData.pageInfo.hasNextPage;

                pageData.media.forEach(anime => {
                    const card = document.createElement('div');
                    card.className = 'anime-card';
                    card.style.cursor = 'pointer';
                    card.onclick = () => openDetails(anime);
                    
                    const title = anime.title.english || anime.title.romaji || anime.title.native;
                    const score = anime.averageScore ? (anime.averageScore / 10).toFixed(1) : 'N/A';
                    const episodes = anime.episodes ? `${anime.episodes} حلقة` : 'مستمر';

                    card.innerHTML = `
                        <div class="poster-wrapper">
                            <img class="poster-img" src="${anime.coverImage.extraLarge}" loading="lazy">
                            <div class="rating-badge"><i class="fa-solid fa-star"></i> ${score}</div>
                        </div>
                        <div class="anime-info">
                            <div class="anime-title">${title}</div>
                            <div class="anime-meta">
                                <span>${anime.format || 'TV'}</span>
                                <span>${episodes}</span>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

                currentPage++;
            } catch (error) {
                console.error(error);
            } finally {
                isLoading = false;
            }
        }

        function openDetails(anime) {
            const modal = document.getElementById('detailsModal');
            const title = anime.title.english || anime.title.romaji || anime.title.native;
            const banner = anime.bannerImage || anime.coverImage.extraLarge;

            document.getElementById('modalBanner').style.backgroundImage = `url('${banner}')`;
            document.getElementById('modalPoster').src = anime.coverImage.extraLarge;
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalScore').innerText = `⭐ ${anime.averageScore ? (anime.averageScore/10).toFixed(1) : 'N/A'}`;
            document.getElementById('modalFormat').innerText = anime.format || 'TV';
            document.getElementById('modalEps').innerText = anime.episodes ? `${anime.episodes} حلقة` : 'مستمر';
            
            let desc = anime.description || 'لا توجد قصة متاحة حالياً.';
            desc = desc.replace(/<[^>]*>?/gm, '');
            document.getElementById('modalSynopsis').innerText = desc;

            const epGrid = document.getElementById('episodesGrid');
            epGrid.innerHTML = '';
            const totalEps = anime.episodes || 12;
            for (let i = 1; i <= Math.min(totalEps, 50); i++) {
                const epCard = document.createElement('div');
                epCard.className = 'ep-card';
                epCard.innerText = `حلقة ${i}`;
                epGrid.appendChild(epCard);
            }

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('detailsModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        window.onscroll = function() {
            if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 600) {
                fetchAniListAnime();
            }
        };

        fetchAniListAnime();
    </script>
</body>
</html>
