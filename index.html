<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Saray Anime</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(ellipse at bottom, #0d1d31 0%, #0c1022 100%);
            min-height: 100vh;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            overflow-x: hidden;
            position: relative;
            padding-bottom: 90px;
        }

        /* 🌙 القمر والغيوم والنجوم */
        .moon {
            position: fixed;
            top: 4%;
            left: 8%;
            width: 75px;
            height: 75px;
            background: radial-gradient(circle at 35% 35%, #ffffff, #e6e6e6 50%, #d4d4d4 100%);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            z-index: 1;
            pointer-events: none;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 6px rgba(255,255,255,0.8); }
        }

        /* 🚀 الحاوية الرئيسية للتطبيق */
        .app-container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 18px;
        }

        /* 🔝 الهيدر العلوي */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .brand-title {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff4b4b 0%, #ff8585 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(255, 75, 75, 0.4);
            animation: pulseFade 4s ease-in-out infinite;
        }

        @keyframes pulseFade {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 10px rgba(255, 75, 75, 0.6)); }
            50% { opacity: 0.3; filter: drop-shadow(0 0 0px rgba(255, 75, 75, 0)); }
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .icon-btn:active {
            transform: scale(0.9);
            background: rgba(255, 75, 75, 0.3);
        }

        /* 🔍 شريط البحث */
        .search-box {
            position: relative;
            margin-bottom: 25px;
        }

        .search-input {
            width: 100%;
            padding: 15px 48px 15px 18px;
            background: rgba(18, 26, 45, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.98rem;
            outline: none;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .search-input:focus {
            border-color: #ff4b4b;
            box-shadow: 0 0 18px rgba(255, 75, 75, 0.3);
        }

        .search-icon {
            position: absolute;
            top: 50%;
            right: 18px;
            transform: translateY(-50%);
            color: #ff8585;
            font-size: 1.1rem;
        }

        /* 🏷️ شريط الأقسام (Horizontal Scroll) */
        .categories-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

        .categories-scroll::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.3s;
            color: #d1d5db;
        }

        .category-chip.active, .category-chip:hover {
            background: linear-gradient(135deg, #ff4b4b, #d63031);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(255, 75, 75, 0.4);
        }
    </style>
</head>
<body>

    <div class="moon"></div>
    <div class="stars" id="starsContainer"></div>

    <div class="app-container">
        <!-- 🔝 الهيدر -->
        <header class="app-header">
            <h1 class="brand-title">Saray Anime</h1>
            <div class="header-actions">
                <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                <button class="icon-btn"><i class="fa-regular fa-user"></i></button>
            </div>
        </header>

        <!-- 🔍 شريط البحث -->
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" class="search-input" placeholder="ابحث عن أنميك المفضل...">
        </div>

        <!-- 🏷️ الأقسام -->
        <div class="categories-scroll">
            <div class="category-chip active">🔥 الكل</div>
            <div class="category-chip">⚡ أكشن</div>
            <div class="category-chip">👻 رعب</div>
            <div class="category-chip">✨ مغامرات</div>
            <div class="category-chip">💖 دراما</div>
            <div class="category-chip">🤖 خيال علمي</div>
        </div>
    </div>

    <script>
        // إنشاء النجوم
        const container = document.getElementById('starsContainer');
        for (let i = 0; i < 90; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2.2 + 0.8;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.left = `${Math.random() * 100}%`;
            const duration = Math.random() * 3 + 2;
            star.style.setProperty('--duration', `${duration}s`);
            star.style.animationDelay = `${Math.random() * 4}s`;
            container.appendChild(star);
        }
    </script>
</body>
</html>
