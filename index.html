<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Saray Anime</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0e17;
            min-height: 100vh;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            overflow-x: hidden;
            position: relative;
            padding-bottom: 90px;
        }

        /* 🌙 القمر والنجوم المحسنة للأداء */
        .moon { position: fixed !important; top: 25px; left: 8%; width: 70px; height: 70px; background: radial-gradient(circle at 35% 35%, #ffffff, #d4d4d4 100%); border-radius: 50%; box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); z-index: 0; pointer-events: none; }
            position: fixed;
            top: 4%;
            left: 8%;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 35% 35%, #ffffff, #d4d4d4 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            z-index: 1;
            pointer-events: none;
            will-change: transform;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.6;
        }

        /* 🚀 الحاوية الرئيسية */
        .app-container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 18px;
        }

        /* 🔝 الهيدر العلوي */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .brand-title {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #8ab4f8;
            text-shadow: 0 0 10px rgba(138, 180, 248, 0.3);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e6ed;
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* 🔍 شريط البحث الخفيف والسريع جداً دون تعليق */
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 14px 45px 14px 16px;
            background: rgba(20, 28, 45, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: #8ab4f8;
        }

        .search-icon {
            position: absolute;
            top: 50%;
            right: 16px;
            transform: translateY(-50%);
            color: #8ab4f8;
            font-size: 1.1rem;
            pointer-events: none;
        }

        /* 🏷️ قائمة الكل */
        .categories-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .category-chip {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            font-size: 0.95rem;
            color: #e0e6ed;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .category-chip.active {
            border-color: #8ab4f8;
            background: rgba(138, 180, 248, 0.12);
            color: #fff;
        }
        .anime-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 15px; }
        .anime-card { position: relative; background: rgba(20, 28, 45, 0.85); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.08); }
        .poster-wrapper { position: relative; width: 100%; padding-top: 140%; background: #141c2d; }
        .poster-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .rating-badge { position: absolute; top: 8px; right: 8px; background: rgba(10, 14, 23, 0.85); padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; color: #ffd700; }
        .anime-info { padding: 10px; }
        .anime-title { font-size: 0.9rem; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .anime-meta { font-size: 0.75rem; color: #8ab4f8; display: flex; justify-content: space-between; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="moon"></div>
    <div class="stars" id="starsContainer"></div>

    <div class="app-container">
        <header class="app-header">
            <h1 class="brand-title">Saray Anime</h1>
            <div class="header-actions">
                <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                <button class="icon-btn"><i class="fa-regular fa-user"></i></button>
            </div>
        </header>

        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" class="search-input" placeholder="ابحث عن أنميك المفضل...">
        </div>

        <div class="categories-container">
            <div class="category-chip active">
                <i class="fa-solid fa-border-all" style="color: #8ab4f8;"></i> الكل
            </div>
        </div>
    </div>

        <div id="animeContainer" class="anime-grid"></div>
    <script>
        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 40; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.left = `${Math.random() * 100}%`;
            starsContainer.appendChild(star);
        }

        let currentPage = 1;
        let isLoading = false;
        let hasNextPage = true;

        const query = `
        query ($page: Int, $perPage: Int) {
          Page (page: $page, perPage: $perPage) {
            pageInfo {
              hasNextPage
            }
            media (type: ANIME, sort: POPULARITY_DESC) {
              id
              title {
                romaji
                native
                english
              }
              coverImage {
                extraLarge
              }
              averageScore
              episodes
              format
            }
          }
        }
        `;

        async function fetchAniListAnime() {
            if (isLoading || !hasNextPage) return;
            isLoading = true;

            const container = document.getElementById('animeContainer');

            try {
                const response = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    body: JSON.stringify({
                        query: query,
                        variables: { page: currentPage, perPage: 20 }
                    })
                });

                const resData = await response.json();
                const pageData = resData.data.Page;
                hasNextPage = pageData.pageInfo.hasNextPage;

                pageData.media.forEach(anime => {
                    const card = document.createElement('div');
                    card.className = 'anime-card';
                    
                    const title = anime.title.english || anime.title.romaji || anime.title.native;
                    const score = anime.averageScore ? (anime.averageScore / 10).toFixed(1) : 'N/A';
                    const episodes = anime.episodes ? `${anime.episodes} حلقة` : 'مستمر';

                    card.innerHTML = `
                        <div class="poster-wrapper">
                            <img class="poster-img" src="${anime.coverImage.extraLarge}" loading="lazy">
                            <div class="rating-badge"><i class="fa-solid fa-star"></i> ${score}</div>
                        </div>
                        <div class="anime-info">
                            <div class="anime-title">${title}</div>
                            <div class="anime-meta">
                                <span>${anime.format || 'TV'}</span>
                                <span>${episodes}</span>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

                currentPage++;
            } catch (error) {
                console.error(error);
            } finally {
                isLoading = false;
            }
        }

        // استشعار السكرول بأسفل الشاشة بدون جمل نصوص
        window.onscroll = function() {
            if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 600) {
                fetchAniListAnime();
            }
        };

        fetchAniListAnime();
    </script>
</body>
</html>
